<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!--
    viewport: width=device-width is important so the game canvas scales
    correctly on iPhone/iPad. user-scalable=no prevents accidental pinch-zoom
    while the player is tapping battle menus.
  -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />

  <title>PokeRogue</title>

  <style>
    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    /* ─── Loading screen (shown while WKWebView warms up) ───── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 999;
      transition: opacity 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-text {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 200, 0, 0.7);
      margin-bottom: 2rem;
    }

    .logo-text span { color: #ffd700; }

    /* Pokéball spinner */
    .pokeball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 4px solid #fff;
      position: relative;
      animation: spin 1s linear infinite;
      margin-bottom: 1.4rem;
    }
    .pokeball::before {
      content: '';
      position: absolute;
      top: 50%;
      left: -4px;
      right: -4px;
      height: 4px;
      background: #fff;
      transform: translateY(-50%);
    }
    .pokeball::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #000;
      transform: translate(-50%, -50%);
    }
    .pokeball-top { /* red half */
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: #e53935;
      border-radius: 56px 56px 0 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      color: #aaa;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── Toolbar (replaces Electron's menu bar) ─────────────── */
    /*
      On iOS we can't have a native menu bar, so we inject a small
      floating toolbar the player can toggle with a swipe-up gesture
      or the ⚙ button. Mirrored from the Electron utility shortcuts.
    */
    #toolbar {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0; right: 0;
      height: 52px;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      transform: translateY(100%);
      transition: transform 0.25s ease;
      z-index: 100;
    }

    #toolbar.visible { transform: translateY(0); }

    .tool-btn {
      flex: 1;
      max-width: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: #ccc;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 2px;
      border-radius: 8px;
      border: none;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-btn:active { background: rgba(255,255,255,0.08); }
    .tool-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; }

    /* Toggle handle — swipe up from bottom to reveal toolbar */
    #toolbar-handle {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0);
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 101;
    }

    #toolbar-handle::after {
      content: '';
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.25);
    }
  </style>
</head>

<body>

  <!-- Loading screen -->
  <div id="loader">
    <div class="pokeball">
      <div class="pokeball-top"></div>
    </div>
    <div class="logo-text">Poke<span>Rogue</span></div>
    <div class="status-text" id="status-msg">Connecting…</div>
  </div>

  <!-- Swipe handle to reveal toolbar -->
  <div id="toolbar-handle" onclick="toggleToolbar()"></div>

  <!-- Utility toolbar (replaces Electron's menu bar shortcuts) -->
  <div id="toolbar">

    <!-- Reload (mirrors Ctrl+R / F5 in Electron) -->
    <button class="tool-btn" onclick="reloadGame()" title="Soft Reset">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Reset
    </button>

    <!-- Type chart (mirrors Ctrl+Y) -->
    <button class="tool-btn" onclick="openTool('https://pokerogue.net/type-chart')" title="Type Chart">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Chart
    </button>

    <!-- pkmn.help calculator (mirrors Ctrl+T) -->
    <button class="tool-btn" onclick="openTool('https://pkmn.help')" title="Type Calculator">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Calc
    </button>

    <!-- RogueDex (mirrors Ctrl+D) -->
    <button class="tool-btn" onclick="openTool('https://pokerogue.net/dex')" title="RogueDex">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Dex
    </button>

    <!-- Team builder (mirrors Ctrl+B) -->
    <button class="tool-btn" onclick="openTool('https://marriland.com/tools/team-builder/')" title="Team Builder">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Team
    </button>

    <!-- Smogon (mirrors Ctrl+S) -->
    <button class="tool-btn" onclick="openTool('https://www.smogon.com')" title="Smogon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Smogon
    </button>

  </div>

  <script>
    // ─── Config ───────────────────────────────────────────────────
    const GAME_URL = 'https://pokerogue.net';

    // ─── Loading screen helpers ───────────────────────────────────
    const loader    = document.getElementById('loader');
    const statusMsg = document.getElementById('status-msg');

    function setStatus(msg) { statusMsg.textContent = msg; }

    function hideLoader() {
      loader.classList.add('hidden');
      // Remove from DOM after fade
      setTimeout(() => loader.remove(), 500);
    }

    // ─── Toolbar toggle ───────────────────────────────────────────
    const toolbar = document.getElementById('toolbar');
    let toolbarVisible = false;

    function toggleToolbar() {
      toolbarVisible = !toolbarVisible;
      toolbar.classList.toggle('visible', toolbarVisible);
    }

    // Hide toolbar when tapping outside it
    document.addEventListener('click', (e) => {
      if (toolbarVisible &&
          !toolbar.contains(e.target) &&
          !document.getElementById('toolbar-handle').contains(e.target)) {
        toolbarVisible = false;
        toolbar.classList.remove('visible');
      }
    });

    // ─── Game actions ─────────────────────────────────────────────

    // Mirrors Ctrl+R / F5 — soft resets via Capacitor's WebView message
    function reloadGame() {
      toggleToolbar();
      // Give the toolbar time to close before reload flicker
      setTimeout(() => {
        if (window.location.href.includes(GAME_URL.replace('https://', ''))) {
          window.location.reload();
        } else {
          // We're in a utility tab — go back to game
          window.location.href = GAME_URL;
        }
      }, 150);
    }

    // Opens external utility URLs in the same WebView.
    // Since we set allowNavigation for pokerogue.net in capacitor.config.ts,
    // everything else will open in Safari via Capacitor Browser plugin.
    // For the simple inline tools (pkmn.help etc) we navigate in-place.
    function openTool(url) {
      toggleToolbar();
      // Check if Capacitor Browser plugin is available (optional dep)
      if (window.Capacitor && window.Capacitor.isPluginAvailable('Browser')) {
        window.Capacitor.Plugins.Browser.open({ url });
      } else {
        // Fallback: open in same WebView
        // The user can swipe back (iOS navigation gesture) to return to game
        window.location.href = url;
      }
    }

    // ─── Startup: redirect to game ────────────────────────────────
    //
    // When capacitor.config.ts has server.url set, Capacitor loads
    // pokerogue.net directly and this script never runs in production.
    //
    // This block is the fallback for local `npx cap serve` testing
    // or if server.url is removed for offline-first builds.
    //
    (async function init() {
      // Are we already on the game? (server.url redirect already happened)
      if (window.location.hostname === 'pokerogue.net' ||
          window.location.hostname.endsWith('.pokerogue.net')) {
        hideLoader();
        return;
      }

      // Check network before redirecting
      setStatus('Checking connection…');
      try {
        const probe = await fetch(GAME_URL + '/favicon.ico', {
          method: 'HEAD',
          cache: 'no-store',
          signal: AbortSignal.timeout(5000),
        });
        if (probe.ok || probe.status === 304) {
          setStatus('Loading game…');
          window.location.replace(GAME_URL);
        } else {
          setStatus('Server unreachable. Check your connection.');
        }
      } catch (err) {
        // Offline or network error
        setStatus('No connection — online mode requires internet.');
        console.warn('[PokeRogue] Network probe failed:', err);
      }
    })();

    // ─── WKWebView scroll lock ─────────────────────────────────────
    // Prevent the rubber-band bounce that feels wrong for a game.
    document.addEventListener('touchmove', (e) => {
      if (e.target === document.body) e.preventDefault();
    }, { passive: false });

    // ─── iOS safe-area keyboard handling ─────────────────────────
    // When the on-screen keyboard appears (e.g. login form), shift
    // the game view up so input fields aren't hidden.
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        document.documentElement.style.setProperty(
          '--keyboard-height',
          `${window.innerHeight - window.visualViewport.height}px`
        );
      });
    }
  </script>

</body>
</html>
