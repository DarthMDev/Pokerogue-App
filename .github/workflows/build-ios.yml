name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm install

      - name: Install Capacitor packages
        run: |
          npm install \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/ios \
            @capacitor/status-bar \
            @capacitor/splash-screen \
            @capacitor/assets
          ./node_modules/.bin/cap --version

      - name: Prepare icon source for Capacitor Assets
        run: |
          # @capacitor/assets expects resources/icon.png as the source image.
          # We use PR.png from the repo's icons/ folder.
          mkdir -p resources
          cp icons/PR.png resources/icon.png
          echo "=== Icon source ready ==="
          sips -g pixelWidth -g pixelHeight resources/icon.png

      - name: Add iOS platform (allow pod install failure)
        run: |
          # cap add ios fails at pod install due to deployment target mismatch,
          # but the Xcode project files ARE generated before it errors, so we
          # allow the failure and patch the target manually below.
          ./node_modules/.bin/cap add ios || true
          echo "=== Verifying project files exist ==="
          ls ios/App/
          echo ""
          echo "=== Podfile contents ==="
          cat ios/App/Podfile

      - name: Patch iOS deployment target to 16.0
        run: |
          python3 - <<'EOF'
          import re

          # ── Patch Podfile ──────────────────────────────────────────
          with open('ios/App/Podfile', 'r') as f:
              podfile = f.read()

          if re.search(r"platform :ios,", podfile):
              podfile = re.sub(
                  r"platform :ios, ['\"][0-9.]+['\"]",
                  "platform :ios, '16.0'",
                  podfile
              )
          else:
              # Insert at top if missing entirely
              podfile = "platform :ios, '16.0'\n" + podfile

          with open('ios/App/Podfile', 'w') as f:
              f.write(podfile)
          print("Podfile patched:")
          print(podfile[:400])

          # ── Patch project.pbxproj ──────────────────────────────────
          path = 'ios/App/App.xcodeproj/project.pbxproj'
          with open(path, 'r') as f:
              content = f.read()

          count_before = content.count('IPHONEOS_DEPLOYMENT_TARGET')
          patched = re.sub(
              r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;',
              'IPHONEOS_DEPLOYMENT_TARGET = 16.0;',
              content
          )
          count_after = patched.count('IPHONEOS_DEPLOYMENT_TARGET = 16.0;')

          with open(path, 'w') as f:
              f.write(patched)
          print(f"pbxproj: {count_before} entries found, {count_after} set to 16.0")
          EOF

      - name: Run pod install with corrected target
        run: cd ios/App && pod install

      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync ios

      - name: Generate iOS icons from PR.png
        run: |
          ./node_modules/.bin/capacitor-assets generate --ios
          echo "=== Generated icons ==="
          ls ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Patch Info.plist
        run: |
          python3 - <<'EOF'
          import plistlib

          plist_path = 'ios/App/App/Info.plist'

          with open(plist_path, 'rb') as f:
              plist = plistlib.load(f)

          # ── ATS — allow pokerogue.net and Discord OAuth ────────────
          plist['NSAppTransportSecurity'] = {
              'NSAllowsArbitraryLoads': False,
              'NSExceptionDomains': {
                  'pokerogue.net': {
                      'NSIncludesSubdomains': True,
                      'NSExceptionAllowsInsecureHTTPLoads': False,
                      'NSExceptionRequiresForwardSecrecy': False,
                      'NSExceptionMinimumTLSVersion': 'TLSv1.2',
                  },
                  'discord.com': {
                      'NSIncludesSubdomains': True,
                      'NSExceptionAllowsInsecureHTTPLoads': False,
                  },
                  'discordapp.com': {
                      'NSIncludesSubdomains': True,
                      'NSExceptionAllowsInsecureHTTPLoads': False,
                  },
              }
          }

          # ── WKWebView cookie persistence (iOS 17+) ─────────────────
          plist['WKAppBoundDomains'] = ['pokerogue.net']

          # ── Background modes — keep process alive on lock/switch ───
          plist['UIBackgroundModes'] = ['fetch']

          # ── Orientations ───────────────────────────────────────────
          plist['UISupportedInterfaceOrientations'] = [
              'UIInterfaceOrientationPortrait',
              'UIInterfaceOrientationLandscapeLeft',
              'UIInterfaceOrientationLandscapeRight',
          ]
          plist['UISupportedInterfaceOrientations~ipad'] = [
              'UIInterfaceOrientationPortrait',
              'UIInterfaceOrientationPortraitUpsideDown',
              'UIInterfaceOrientationLandscapeLeft',
              'UIInterfaceOrientationLandscapeRight',
          ]

          # ── Status bar ─────────────────────────────────────────────
          plist['UIStatusBarStyle'] = 'UIStatusBarStyleLightContent'
          plist['UIViewControllerBasedStatusBarAppearance'] = True

          # ── Required for env(safe-area-inset-*) CSS to work ────────
          # Without this, the Dynamic Island safe area CSS in index.html
          # is ignored on some devices.
          plist['UIRequiresFullScreen'] = True

          # ── Capacitor URL scheme ───────────────────────────────────
          existing = plist.get('CFBundleURLTypes', [])
          existing.append({'CFBundleURLSchemes': ['pokerogue']})
          plist['CFBundleURLTypes'] = existing

          with open(plist_path, 'wb') as f:
              plistlib.dump(plist, f)

          print("Info.plist patched successfully")
          EOF

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

          echo "=== Verifying archive ==="
          ls "$RUNNER_TEMP/App.xcarchive/Products/Applications/" 2>/dev/null \
            || (echo "Archive not found — xcodebuild failed" && exit 1)

      - name: Package into unsigned IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r \
            "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r PokeRogue-unsigned.ipa Payload/
          echo "=== IPA size ==="
          du -sh PokeRogue-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokeRogue-iOS-unsigned
          path: ${{ runner.temp }}/PokeRogue-unsigned.ipa
          retention-days: 30